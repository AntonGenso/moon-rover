<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moon Rover: Shield Run</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @font-face {
    font-family: 'GameFont';
    src: local('Helvetica Neue'), local('Arial');
    font-weight: 400;
  }

  body {
    background: #000;
    overflow: hidden;
    touch-action: none;
    font-family: 'GameFont', sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }

  #game-container {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
  }

  #game-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  #start-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    opacity: 1;
    transition: opacity 0.6s ease;
  }

  #start-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .start-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
  }

  .start-gradient {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 60%;
    background: linear-gradient(to top, rgba(6,4,16,0.97) 0%, rgba(6,4,16,0.7) 55%, transparent 100%);
  }

  .start-content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10vh 24px 5vh;
  }

  .mission-label {
    font-size: 11px;
    font-weight: 400;
    color: #FFA91F;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeDown 0.8s ease forwards 0.3s;
  }

  .game-title {
    font-size: clamp(28px, 8vw, 42px);
    font-weight: 800;
    color: #fff;
    letter-spacing: 3px;
    text-align: center;
    text-shadow: 0 2px 30px rgba(0,0,0,0.5);
    opacity: 0;
    animation: fadeDown 0.8s ease forwards 0.5s;
  }

  .game-subtitle {
    font-size: clamp(13px, 3.5vw, 17px);
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeDown 0.8s ease forwards 0.7s;
  }

  .spacer { flex: 1; }

  .play-btn {
    width: clamp(200px, 55vw, 260px);
    height: 56px;
    border-radius: 28px;
    background: #FFA91F;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 18px;
    font-weight: 700;
    color: #0a0816;
    letter-spacing: 2px;
    margin-bottom: 6vh;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.0s;
    transition: transform 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .play-btn:active {
    transform: scale(0.95);
  }

  .play-btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: shimmer 3s ease-in-out infinite 2s;
  }

  .platform-label {
    font-size: 9px;
    font-weight: 400;
    color: rgba(255,255,255,0.12);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.2s;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shimmer {
    0% { left: -100%; }
    30% { left: 150%; }
    100% { left: 150%; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<div id="game-container">
  <canvas id="game-canvas"></canvas>

  <div id="start-screen">
    <img src="public/assets/start-bg.jpg" class="start-bg" alt="">
    <div class="start-gradient"></div>
    <div class="start-content">
      <div class="mission-label">Mission 3</div>
      <div class="game-title">MOON ROVER</div>
      <div class="game-subtitle">Shield Run</div>
      <div class="spacer"></div>
      <button class="play-btn" id="play-btn">PLAY</button>
      <div class="platform-label">Step to the Moon</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

/* --- Stars background (visible after transition) --- */
const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.5 + 0.3,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.008 + 0.003
  });
}

function drawStars(t) {
  ctx.fillStyle = '#0a0816';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const alpha = 0.3 + 0.7 * Math.abs(Math.sin(s.phase + t * s.speed));
    ctx.beginPath();
    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });
}

/* --- Game loop (placeholder for now) --- */
let gameStarted = false;
let startTime = 0;

function gameLoop(timestamp) {
  if (!startTime) startTime = timestamp;
  const t = (timestamp - startTime) / 1000;

  drawStars(t);

  if (gameStarted) {
    // TODO: game logic will go here
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Game starting...', canvas.width / 2, canvas.height / 2);
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

/* --- Play button --- */
document.getElementById('play-btn').addEventListener('click', () => {
  document.getElementById('start-screen').classList.add('hidden');
  gameStarted = true;
  // TODO: init game, start tutorial phase
});
</script>

</body>
</html>
