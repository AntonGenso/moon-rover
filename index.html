<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moon Rover: Shield Run</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06040f;
    overflow: hidden;
    touch-action: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }

  #game-wrapper {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #06040f;
  }

  #game-container {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 480px;
    overflow: hidden;
  }

  @media (min-width: 600px) {
    #game-container {
      max-height: 100vh;
      aspect-ratio: 9 / 19.5;
      border-radius: 32px;
      border: 2px solid #1a1a2e;
    }
  }

  #game-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  /* === LOADING SCREEN === */
  #loading-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #06040f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    transition: opacity 0.5s ease;
  }

  #loading-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-title {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
    margin-bottom: 6px;
  }

  .loading-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 4px;
    margin-bottom: 40px;
  }

  .progress-track {
    width: 180px;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: #FFA91F;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* === START SCREEN === */
  #start-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }

  #start-screen.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #start-screen.exit {
    opacity: 0;
    pointer-events: none;
  }

  .start-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
  }

  .start-gradient-bottom {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 55%;
    background: linear-gradient(to top, rgba(6,4,15,0.97) 0%, rgba(6,4,15,0.65) 55%, transparent 100%);
  }

  .start-gradient-top {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 40%;
    background: linear-gradient(to bottom, rgba(6,4,15,0.7) 0%, transparent 100%);
  }

  .start-content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 5vh 24px 5vh;
  }

  .mission-label {
    font-size: 13px;
    font-weight: 500;
    color: #FFA91F;
    letter-spacing: 5px;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8), 0 2px 16px rgba(0,0,0,0.6);
    opacity: 0;
    animation: fadeDown 0.8s ease forwards 0.2s;
  }

  .game-title {
    font-size: clamp(34px, 10vw, 48px);
    font-weight: 800;
    color: #fff;
    letter-spacing: 3px;
    text-align: center;
    line-height: 1.1;
    text-shadow:
      0 2px 8px rgba(0,0,0,0.9),
      0 4px 20px rgba(0,0,0,0.7),
      0 0 40px rgba(0,0,0,0.5);
    opacity: 0;
    animation: fadeDown 0.8s ease forwards 0.4s;
  }

  .game-subtitle {
    font-size: clamp(14px, 4vw, 18px);
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    letter-spacing: 7px;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8), 0 2px 16px rgba(0,0,0,0.6);
    opacity: 0;
    animation: fadeDown 0.8s ease forwards 0.6s;
  }

  .spacer { flex: 1; }

  .play-btn {
    width: clamp(200px, 55vw, 260px);
    height: 56px;
    border-radius: 28px;
    background: #FFA91F;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 18px;
    font-weight: 700;
    color: #0a0816;
    letter-spacing: 2px;
    margin-bottom: 5vh;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.9s;
    transition: transform 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .play-btn:active {
    transform: scale(0.95);
  }

  .play-btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: shimmer 3s ease-in-out infinite 2s;
  }

  .platform-label {
    font-size: 9px;
    font-weight: 400;
    color: rgba(255,255,255,0.12);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.1s;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shimmer {
    0% { left: -100%; }
    30% { left: 150%; }
    100% { left: 150%; }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="loading-screen">
      <div class="loading-title">MOON ROVER</div>
      <div class="loading-sub">SHIELD RUN</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div id="start-screen">
      <img src="public/assets/start-bg.webp" class="start-bg" id="start-bg" alt="">
      <div class="start-gradient-top"></div>
      <div class="start-gradient-bottom"></div>
      <div class="start-content">
        <div class="mission-label">Mission 3</div>
        <div class="game-title">MOON ROVER</div>
        <div class="game-subtitle">Shield Run</div>
        <div class="spacer"></div>
        <button class="play-btn" id="play-btn">PLAY</button>
        <div class="platform-label">Step to the Moon</div>
      </div>
    </div>
  </div>
</div>

<script>
var img = document.getElementById('start-bg');
var loadingScreen = document.getElementById('loading-screen');
var startScreen = document.getElementById('start-screen');
var progressFill = document.getElementById('progress-fill');

var loadProgress = 0;
var loaded = false;

var progressInterval = setInterval(function() {
  if (loaded) {
    loadProgress = 100;
  } else {
    loadProgress = Math.min(loadProgress + Math.random() * 8 + 2, 90);
  }
  progressFill.style.width = loadProgress + '%';

  if (loadProgress >= 100) {
    clearInterval(progressInterval);
    setTimeout(function() {
      loadingScreen.classList.add('hidden');
      startScreen.classList.add('visible');
    }, 300);
  }
}, 120);

if (img.complete && img.naturalWidth > 0) {
  loaded = true;
} else {
  img.addEventListener('load', function() { loaded = true; });
  img.addEventListener('error', function() { loaded = true; });
}

var canvas = document.getElementById('game-canvas');
var ctx = canvas.getContext('2d');
var container = document.getElementById('game-container');

function resize() {
  var rect = container.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
}

window.addEventListener('resize', resize);
resize();

var stars = [];
for (var i = 0; i < 80; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.5 + 0.3,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.008 + 0.003
  });
}

function drawStars(t) {
  var w = canvas.width / (window.devicePixelRatio || 1);
  var h = canvas.height / (window.devicePixelRatio || 1);
  ctx.fillStyle = '#06040f';
  ctx.fillRect(0, 0, w, h);
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    var alpha = 0.3 + 0.7 * Math.abs(Math.sin(s.phase + t * s.speed));
    ctx.beginPath();
    ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
    ctx.fill();
  }
}

var gameStarted = false;
var startTime = 0;

function gameLoop(timestamp) {
  if (!startTime) startTime = timestamp;
  var t = (timestamp - startTime) / 1000;
  var w = canvas.width / (window.devicePixelRatio || 1);
  var h = canvas.height / (window.devicePixelRatio || 1);

  drawStars(t);

  if (gameStarted) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Game starting...', w / 2, h / 2);
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

document.getElementById('play-btn').addEventListener('click', function() {
  startScreen.classList.remove('visible');
  startScreen.classList.add('exit');
  gameStarted = true;
});
</script>

</body>
</html>
